receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:

exporters:
  otlphttp/axiom:
    endpoint: "https://api.axiom.co"
    headers:
      authorization: "Bearer ${env:AXIOM_TOKEN}"
      X-Axiom-Dataset: "${env:AXIOM_DATASET}"

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/axiom]
