name: Mento CI/CD to AWS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1                  
  ECR_REPOSITORY: mento-backend          

jobs:
  build-and-deploy:
    name: Build & Push to Amazon ECR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Force LFS Pull and Verify Sizes
        run: |
          git lfs pull
          echo "Checking file sizes before building Docker..."
          ls -lh models/module1/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }} 
          LATEST_TAG: latest           
        run: |
          docker build -t $REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG -t $REGISTRY/${{ env.ECR_REPOSITORY }}:$LATEST_TAG .
          docker push $REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          docker push $REGISTRY/${{ env.ECR_REPOSITORY }}:$LATEST_TAG

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Pulling your API keys from GitHub Secrets
          INTENT_GROQ_API_KEY: ${{ secrets.INTENT_GROQ_API_KEY }}
          RAG_GROQ_API_KEY: ${{ secrets.RAG_GROQ_API_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          QDRANT_COLLECTION: ${{ secrets.QDRANT_COLLECTION }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # Passing the environment variables into the SSH session
          envs: INTENT_GROQ_API_KEY,RAG_GROQ_API_KEY,QDRANT_URL,QDRANT_API_KEY,QDRANT_COLLECTION
          script: |
            # 1. Log Docker into AWS ECR
            aws ecr get-login-password --region us-east-1 | sudo docker login --username AWS --password-stdin 404147232508.dkr.ecr.us-east-1.amazonaws.com
            
            # 2. Stop and remove the old container and image
            sudo docker rm -f mento-api || true
            sudo docker rmi -f 404147232508.dkr.ecr.us-east-1.amazonaws.com/mento-backend:latest || true
            
            # 3. Pull the fresh image
            sudo docker pull 404147232508.dkr.ecr.us-east-1.amazonaws.com/mento-backend:latest
            
            # 4. Launch the new container using the injected secrets
            sudo docker run -d -p 7860:7860 \
              -e INTENT_GROQ_API_KEY="$INTENT_GROQ_API_KEY" \
              -e RAG_GROQ_API_KEY="$RAG_GROQ_API_KEY" \
              -e QDRANT_URL="$QDRANT_URL" \
              -e QDRANT_API_KEY="$QDRANT_API_KEY" \
              -e QDRANT_COLLECTION="$QDRANT_COLLECTION" \
              -e USE_LOCAL_EMOTION_MODEL="false" \
              --name mento-api \
              404147232508.dkr.ecr.us-east-1.amazonaws.com/mento-backend:latest